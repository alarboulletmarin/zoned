# Bot detection: serve prerendered HTML to search engine crawlers and social/AI bots
map $http_user_agent $is_bot {
    default                       0;
    # Search engines
    ~*googlebot                   1;
    ~*bingbot                     1;
    ~*yandex                      1;
    ~*baiduspider                 1;
    ~*duckduckbot                 1;
    # Social media
    ~*facebookexternalhit         1;
    ~*facebot                     1;
    ~*twitterbot                  1;
    ~*linkedinbot                 1;
    ~*whatsapp                    1;
    ~*slackbot                    1;
    ~*telegrambot                 1;
    ~*discordbot                  1;
    # AI bots
    ~*gptbot                      1;
    ~*perplexitybot               1;
    ~*claudebot                   1;
    ~*anthropic                   1;
    ~*chatgpt                     1;
    ~*cohere-ai                   1;
    ~*bytespider                  1;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker et manifest - jamais en cache
    location ~ ^/(sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Prerendered HTML served to bots
    # Tries the prerendered file at {route}/index.html, falls back to SPA shell
    location @prerender {
        try_files $uri/index.html $uri /index.html;
    }

    # Main routing
    location / {
        # Route bots to prerendered HTML via @prerender
        recursive_error_pages off;
        error_page 418 = @prerender;
        if ($is_bot) {
            return 418;
        }

        # Regular users get standard SPA routing
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/manifest+json;
}
